services:
  # ========== Go 应用 ==========
  app:
    image: ${DOCKER_IMAGE:-flandern/youdaonotelm:latest}
    container_name: youdaonotelm-app
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml:ro
      - ./configs/youdao_cookies.json:/app/configs/youdao_cookies.json:ro
      - app-logs:/app/logs
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      milvus:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - youdaonotelm-net
    restart: unless-stopped

  # ========== MySQL ==========
  mysql:
    image: mysql:8.4
    container_name: youdaonotelm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-youdao}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - youdaonotelm-net
    restart: unless-stopped

  # ========== Redis ==========
  redis:
    image: redis:7.4-alpine
    container_name: youdaonotelm-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - youdaonotelm-net
    restart: unless-stopped

  # ========== MinIO 对象存储 ==========
  minio:
    image: minio/minio:latest
    container_name: youdaonotelm-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - youdaonotelm-net
    restart: unless-stopped

  # ========== Milvus 依赖：etcd ==========
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: youdaonotelm-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - youdaonotelm-net
    restart: unless-stopped

  # ========== Milvus 依赖：MinIO (内部存储) ==========
  milvus-minio:
    image: minio/minio:latest
    container_name: youdaonotelm-milvus-minio
    environment:
      MINIO_ACCESS_KEY: ${MILVUS_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MILVUS_MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - milvus-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - youdaonotelm-net
    restart: unless-stopped

  # ========== Milvus 向量数据库 ==========
  milvus:
    image: milvusdb/milvus:v2.5.10
    container_name: youdaonotelm-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - youdaonotelm-net
    restart: unless-stopped

  # ========== MarkItDown 文档转换服务 ==========
  markitdown:
    image: ${MARKITDOWN_IMAGE:-flandern1211/markitdown:latest}
    container_name: youdaonotelm-markitdown
    ports:
      - "${MARKITDOWN_PORT:-8085}:8085"
    volumes:
      - markitdown-cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - youdaonotelm-net
    restart: unless-stopped

# ========== 数据卷 ==========
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  app-logs:
    driver: local
  minio-data:
    driver: local
  etcd-data:
    driver: local
  milvus-minio-data:
    driver: local
  milvus-data:
    driver: local
  markitdown-cache:
    driver: local

# ========== 网络 ==========
networks:
  youdaonotelm-net:
    driver: bridge
