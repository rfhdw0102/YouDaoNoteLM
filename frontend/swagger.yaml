      summary: 批量导入搜索结果
      description: 批量抓取多个 URL 并导入，返回任务 ID 用于查询进度
      operationId: importSearchResults
      security:
        - BearerAuth: []
      parameters:
        - name: nbId
          in: path
          required: true
