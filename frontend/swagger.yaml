  # ==================== Import ====================
  /notebooks/{nbId}/import/file:
    post:
      tags: [Import]
      summary: 文件上传导入
      description: 上传文件（PDF/DOCX/TXT 等）并导入到指定笔记本
      operationId: importFile
      security:
        - BearerAuth: []
      parameters:
        - name: nbId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "支持格式: PDF, DOCX, TXT, MD, HTML"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SourceResponse'

  /notebooks/{nbId}/import/audio/preview:
    post:
      tags: [Import]
      summary: 音频上传转写预览
      description: 上传音频文件，返回 ASR 转写预览结果
      operationId: previewAudio
      security:
        - BearerAuth: []
      parameters:
        - name: nbId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "支持格式: MP3, WAV, M4A, AAC"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          preview_id:
                            type: string
                            description: 预览 ID，用于后续确认接口
                          content:
                            type: string
                            description: 转写文本
                          file_name:
                            type: string

  /import/audio/confirm:
    post:
      tags: [Import]
      summary: 确认音频导入
      description: 确认音频转写结果并导入到笔记本。可修改转写文本后再确认。
      operationId: confirmAudio
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AudioConfirmRequest'
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SourceResponse'

  /import/tasks/{taskId}:
    get:
      tags: [Import]
      summary: 查询导入任务进度
      operationId: getImportTask
      security:
        - BearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
          description: 任务 ID（由 URL 导入或批量导入接口返回）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ImportTaskResponse'

  # ==================== Search ====================
  /notebooks/{nbId}/search:
    post:
      tags: [Search]
      summary: 智能搜索
      description: |
        Agent 自主执行多轮搜索 + 分析，返回评分后的搜索结果和摘要。
        需要先在用户配置中配置 LLM 服务。
      operationId: search
      security:
        - BearerAuth: []
      parameters:
        - name: nbId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SearchResponse'

  /notebooks/{nbId}/search/url:
    post:
      tags: [Search]
      summary: URL 直接导入
      description: 抓取指定 URL 的内容并导入到笔记本
      operationId: importFromURL
      security:
        - BearerAuth: []
      parameters:
        - name: nbId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/URLImportRequest'
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Response'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskIDResponse'

  /notebooks/{nbId}/search/import:
    post:
